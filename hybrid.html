<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alibaba Service Calculator - Hybrid</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1e3a8a;
            --dark-navy: #0f172a;
            --accent-green: #4ade80;
            --border: #e2e8f0;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            margin: 0;
            padding: 15px;
            font-size: 13px;
        }

        .wrapper {
            max-width: 100%;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            align-items: start;
        }

        .card {
            background: white;
            border-radius: 6px;
            border: 1px solid var(--border);
            margin-bottom: 15px;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }
        .card-header {
            background: var(--navy);
            color: white;
            padding: 8px 15px;
            font-weight: 700;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .delivery-sidebar-card {
            background: var(--navy);
            border-radius: 6px;
            padding: 10px 15px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .print-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr 1.5fr;
            gap: 15px;
        }
        .row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .col-label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-bottom: 5px; display: block;}

        .item-row {
            display: grid;
            grid-template-columns: 1fr 90px;
            padding: 6px 15px;
            border-bottom: 1px solid #f1f5f9;
            align-items: center;
        }
        .item-row:last-child { border-bottom: none; }
        .item-row:nth-child(even) { background: #fbfcfd; }
        label { font-weight: 500; color: #334155; font-size: 12px; }

        input[type="number"], select {
            padding: 4px 8px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 12px;
            font-family: 'Inter', sans-serif;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }
        input[type="number"] { font-weight: 700; text-align: center; }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--accent-green);
        }

        .sidebar-column { position: sticky; top: 15px; }
        .sidebar {
            background: var(--dark-navy);
            color: white;
            padding: 20px;
            border-radius: 8px;
        }
        .sidebar h3 { margin: 0 0 15px 0; font-size: 15px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        .breakdown-section { margin-bottom: 15px; }
        .breakdown-title { font-size: 10px; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid #1e293b; padding-bottom: 2px;}
        .summary-line {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 4px;
            color: #cbd5e1;
        }
        .summary-line b { color: white; }

        .total-box {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 2px solid #334155;
            text-align: center;
        }
        .total-val { font-size: 32px; font-weight: 800; color: var(--accent-green); display: block; }
        .btn-reset { background: #334155; color: white; border: none; font-size: 10px; padding: 3px 8px; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="main-content">

        <div class="card">
            <div class="card-header">
                1. Printing & Finishing
                <button class="btn-reset" onclick="resetAll()">Reset All</button>
            </div>
            <div class="print-grid">
                <div>
                    <span class="col-label">Main Printing</span>
                    <select id="pSize" onchange="update()">
                        <option value="A5">A5 Flyer</option>
                        <option value="A4">A4 Flyer</option>
                        <option value="A3">A3 Flyer</option>
                    </select>
                    <select id="pGsm" onchange="update()" style="margin: 5px 0;">
                        <option value="80">80GSM Simili</option>
                        <option value="128">128GSM Art Paper</option>
                        <option value="157">157GSM Art Paper</option>
                        <option value="260">260GSM Art Card</option>
                    </select>
                    <select id="pSide" onchange="update()" style="margin-bottom: 5px;">
                        <option value="ss">Single Sided</option>
                        <option value="ds">Double Sided</option>
                    </select>
                    <input type="number" id="pQty" value="" placeholder="Printing Qty" oninput="update()">
                </div>
                <div>
                    <span class="col-label">Add-on Printing</span>
                    <select id="pAddon" onchange="update()">
                        <option value="0">Add-on: No</option>
                        <option value="1">Add-on: Yes</option>
                    </select>
                    <input type="number" id="pAddQty" value="" placeholder="Qty" oninput="update()" style="margin-top:5px;">
                </div>
                <div>
                    <span class="col-label">Finishing</span>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                        <select class="f-opt" data-name="Folding" onchange="update()"><option value="0">Folding: No</option><option value="1">Folding: Yes</option></select>
                        <select class="f-opt" data-name="Matte Paper" onchange="update()"><option value="0">Matte Paper: No</option><option value="1">Matte Paper: Yes</option></select>
                        <select class="f-opt" data-name="Crease+Fold" onchange="update()"><option value="0">Crease+Fold: No</option><option value="1">Crease+Fold: Yes</option></select>
                        <select class="f-opt" data-name="Perforation" onchange="update()"><option value="0">Perforation: No</option><option value="1">Perforation: Yes</option></select>
                        <select class="f-opt" data-name="Gloss Lami" onchange="update()"><option value="0">Gloss Lami: No</option><option value="1">Gloss Lami: Yes</option></select>
                        <select class="f-opt" data-name="Matte Lami" onchange="update()"><option value="0">Matte Lami: No</option><option value="1">Matte Lami: Yes</option></select>
                    </div>
                </div>
            </div>
        </div>

        <div class="dist-container">
            <div class="card">
                <div class="card-header">2. HDB Distribution Services</div>
                <div style="padding:8px 15px; background:#f1f5f9; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:center;">
                    <span class="col-label" style="margin:0; white-space:nowrap;">Flyer Size</span>
                    <select id="dSize" onchange="update()" style="width:auto;">
                        <option value="A5">A5</option>
                        <option value="A4">A4</option>
                        <option value="A3">A3</option>
                    </select>
                    <span class="col-label" style="margin:0; white-space:nowrap;">Paper GSM</span>
                    <select id="dGsm" onchange="update()" style="width:auto;">
                        <option value="128">128gsm</option>
                        <option value="157">157gsm</option>
                        <option value="260">260gsm</option>
                    </select>
                </div>
                <div class="item-row"><label>HDB Landmark</label><input type="number" class="d-val" data-type="hdb-std" oninput="update()"></div>
                <div class="item-row"><label>HDB Selected Estate</label><input type="number" class="d-val" data-type="hdb-estate" oninput="update()"></div>
                <div class="item-row"><label>HDB Selected Blocks (通)</label><input type="number" class="d-val" data-type="hdb-tong" oninput="update()"></div>
                <div class="item-row"><label>HDB Selected Blocks (不通)</label><input type="number" class="d-val" data-type="hdb-butong" oninput="update()"></div>
                <div class="item-row"><label>HDB Letterbox</label><input type="number" class="d-val" data-type="hdb-lb" oninput="update()"></div>
                <div class="item-row"><label>Express HDB Add-on</label><input type="number" class="d-val" data-type="express-hdb" oninput="update()"></div>
                <div class="item-row"><label>Additional Landmark</label><input type="number" class="d-val" data-type="landmark" oninput="update()"></div>
                <div class="item-row"><label>Solo Flyer</label><input type="number" class="d-val" data-type="solo" oninput="update()"></div>
                <div class="item-row"><label>Multiple Flyer per Unit (# designs)</label><input type="number" id="hdbMultiCount" min="0" max="10" placeholder="# of designs" oninput="updateMultiDesigns('hdb')"></div>
                <div id="hdbMultiRows" style="padding:0 15px;"></div>
            </div>

            <div class="row-split">
                <div class="card">
                    <div class="item-row" style="background:var(--navy); color:white; font-weight:700; font-size:11px;">LANDED</div>
                    <div class="item-row"><label>Letter Box</label><input type="number" class="d-val" data-type="landed" oninput="update()"></div>
                    <div class="item-row"><label>Express Add-on</label><input type="number" class="d-val" data-type="express-landed" oninput="update()"></div>
                    <div class="item-row"><label>Additional Landmark</label><input type="number" class="d-val" data-type="landed-landmark" oninput="update()"></div>
                    <div class="item-row"><label>Solo Flyer</label><input type="number" class="d-val" data-type="landed-solo" oninput="update()"></div>
                    <div class="item-row"><label>Multiple per Unit (# designs)</label><input type="number" id="landedMultiCount" min="0" max="10" placeholder="# of designs" oninput="updateMultiDesigns('landed')"></div>
                    <div id="landedMultiRows" style="padding:0 15px;"></div>
                </div>
                <div class="card">
                    <div class="item-row" style="background:var(--navy); color:white; font-weight:700; font-size:11px;">INDUSTRIAL</div>
                    <div class="item-row"><label>Letter Box</label><input type="number" class="d-val" data-type="industrial" oninput="update()"></div>
                    <div class="item-row"><label>Express Add-on</label><input type="number" class="d-val" data-type="express-industrial" oninput="update()"></div>
                    <div class="item-row"><label>Additional Landmark</label><input type="number" class="d-val" data-type="ind-landmark" oninput="update()"></div>
                    <div class="item-row"><label>Solo Flyer</label><input type="number" class="d-val" data-type="ind-solo" oninput="update()"></div>
                    <div class="item-row"><label>Multiple per Unit (# designs)</label><input type="number" id="indMultiCount" min="0" max="10" placeholder="# of designs" oninput="updateMultiDesigns('ind')"></div>
                    <div id="indMultiRows" style="padding:0 15px;"></div>
                </div>
            </div>

            <div class="card">
                <div class="item-row" style="background:var(--navy); color:white; font-weight:700; font-size:11px;">WALKWAY & MANPOWER</div>
                <div class="item-row"><label>Walkway Standard</label><input type="number" class="d-val" data-type="walk-std" oninput="update()"></div>
                <div class="item-row"><label>Walkway (School)</label><input type="number" class="d-val" data-type="walk-std" oninput="update()"></div>
                <div class="item-row"><label>Walkway (Remote Place)</label><input type="number" class="d-val" data-type="walk-remote" oninput="update()"></div>
                <div class="item-row"><label>Walkway Selected Date</label><input type="number" class="d-val" data-type="walk-exp" oninput="update()"></div>
                <div class="item-row"><label>Walkway Express (Remote)</label><input type="number" class="d-val" data-type="walk-expr" oninput="update()"></div>
                <div class="item-row"><label>Walkway Sandwich Board</label><input type="number" class="d-val" data-type="walk-std" oninput="update()"></div>
                <div class="item-row"><label>Walkway Backpack</label><input type="number" class="d-val" data-type="walk-std" oninput="update()"></div>
                <div class="item-row"><label>Printing Formboard Add-on</label><input type="number" class="d-val" data-type="walk-std" oninput="update()"></div>
            </div>
        </div>
    </div>

    <div class="sidebar-column">
        <div class="sidebar">
            <h3>Quotation Summary</h3>
            <div id="pBreak" class="breakdown-section"></div>
            <div id="dBreak" class="breakdown-section"></div>

            <div class="total-box">
                <span style="font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: 1px;">GRAND TOTAL</span>
                <span class="total-val" id="sumGrand">$0.00</span>
            </div>
        </div>

        <div class="delivery-sidebar-card">
            <label style="font-size: 11px; font-weight: 800; color: white; letter-spacing: 0.5px;">DELIVERY SERVICE?</label>
            <input type="checkbox" id="delToggle" onchange="update()">
        </div>
    </div>
</div>

var EXPRESS_RATE_PER_K={hdb:20,landed:40,industrial:40};

// ========= PRINTING: next tier UP (no proration) =========
function getPrintCost(size, gsm, side, qty) {
    var tiers = HYBRID_PRINT[size] && HYBRID_PRINT[size][gsm];
    if (!tiers || qty <= 0) return {cost:0, exceeded:false};
    var col = (side === 'ds') ? 2 : 1;
    for (var i = 0; i < tiers.length; i++) {
        if (qty <= tiers[i][0]) return {cost:tiers[i][col], exceeded:false};
    }
    return {cost:tiers[tiers.length - 1][col], exceeded:true};
}

// ========= DISTRIBUTION: prorate (same logic as Distribution Only) =========
function prorate(tiers, qty, sizeIdx) {
    if (!tiers || !tiers.length) return 0;
    for (var i = 0; i < tiers.length; i++) {
        if (qty === tiers[i][0]) return tiers[i][sizeIdx];
        if (qty < tiers[i][0]) {
            if (i === 0) {
                var calc = tiers[0][sizeIdx] * (qty / tiers[0][0]);
                return Math.min(calc, tiers[0][sizeIdx]);
            }
            var unitRate = tiers[i-1][sizeIdx] / tiers[i-1][0];
            var calc = unitRate * qty;
            return Math.min(calc, tiers[i][sizeIdx]);
        }
    }
    return null; // above max tier
}

function getDistCost(type, gsm, size, qty) {
    var sizeIdx = {A5:1, A4:2, A3:3}[size] || 1;
    var map = DIST_TIER_MAP[type];
    if (!map) return 0;
    // 80gsm uses same rates as 128gsm
    var g = (gsm === '80') ? '128' : gsm;
    var t = map.tiers[g];
    var r = map.rate[g];
    if (!t || !r) return 0;
    var p = prorate(t, qty, sizeIdx);
    if (p !== null) return p;
    // Above max tier: base + extra at per-1K rate
    var base = t[t.length-1][sizeIdx];
    var rate = r[size] || 0;
    return base + ((qty - map.maxQty) / 1000) * rate;
}

function getWalkCost(type, gsm, size, slots) {
    var sizeIdx = {A5:1, A4:2, A3:3}[size] || 1;
    var map = WALK_MAP[type];
    if (!map) return 0;
    var g = (gsm === '80') ? '128' : gsm;
    var t = map.tiers[g];
    var r = map.rate[g];
    if (!t || !r) return 0;
    for (var i = 0; i < t.length; i++) {
        if (slots === t[i][0]) return t[i][sizeIdx];
    }
    if (slots > 4) {
        return t[t.length-1][sizeIdx] + (slots - 4) * (r[size] || 0);
    }
    return 0;
}

// ========= MAIN UPDATE =========
function update() {
    var size = document.getElementById('pSize').value;
    var gsm = document.getElementById('pGsm').value;
    var side = document.getElementById('pSide').value;
    var qty = parseInt(document.getElementById('pQty').value) || 0;

    var pTotal = 0, dTotal = 0;
    var pH = '<div class="breakdown-title">Printing & Finishing</div>';
    var dH = '<div class="breakdown-title">Distribution Services</div>';
    var hasP = false, hasD = false;

    // 1. Printing cost (next tier up, no proration)
    if (qty > 0) {
        var result = getPrintCost(size, gsm, side, qty);
        if (result.cost > 0) {
            pTotal += result.cost;
            var warn = result.exceeded ? ' <span style="color:#fbbf24">(max tier)</span>' : '';
            pH += '<div class="summary-line"><span>' + size + ' ' + gsm + 'gsm ' + (side==='ds'?'DS':'SS') + ' x' + qty.toLocaleString() + warn + '</span><b>$' + result.cost.toFixed(2) + '</b></div>';
            hasP = true;
        }
    }

    // Add-on printing
    if (document.getElementById('pAddon').value === '1') {
        var addQty = parseInt(document.getElementById('pAddQty').value) || 0;
        if (addQty > 0) {
            var addResult = getPrintCost(size, gsm, side, addQty);
            if (addResult.cost > 0) {
                pTotal += addResult.cost;
                var addWarn = addResult.exceeded ? ' <span style="color:#fbbf24">(max tier)</span>' : '';
                pH += '<div class="summary-line"><span>Add-on x' + addQty.toLocaleString() + addWarn + '</span><b>$' + addResult.cost.toFixed(2) + '</b></div>';
                hasP = true;
            }
        }
    }

    // Finishing (placeholder - rates TBD)
    document.querySelectorAll('.f-opt').forEach(function(o) {
        if (o.value === '1') {
            pH += '<div class="summary-line"><span>' + o.dataset.name + '</span><b style="color:#fbbf24">TBD</b></div>';
            hasP = true;
        }
    });

    // 2. Distribution costs (tier-based proration, same as Distribution Only)
    var dSize = document.getElementById('dSize').value;
    var dGsm = document.getElementById('dGsm').value;

    document.querySelectorAll('.d-val').forEach(function(input) {
        var val = parseFloat(input.value) || 0;
        if (val <= 0) return;

        var type = input.dataset.type;
        var label = input.closest('.item-row').querySelector('label').textContent;
        var cost = 0;

        if (type === 'express-hdb') {
            cost = Math.max((val / 1000) * EXPRESS_RATE_PER_K.hdb, EXPRESS_MIN);
        } else if (type === 'express-landed' || type === 'express-industrial') {
            cost = Math.max((val / 1000) * EXPRESS_RATE_PER_K.landed, EXPRESS_MIN);
        } else if (type === 'landmark' || type === 'landed-landmark' || type === 'ind-landmark') {
            cost = val * LANDMARK_RATE;
        } else if (type === 'solo' || type === 'landed-solo' || type === 'ind-solo') {
            var s = SOLELY[dGsm];
            if (s) cost = (val / 1000) * (s[dSize] || 0);
        } else if (type.indexOf('walk-') === 0) {
            cost = getWalkCost(type, dGsm, dSize, val);
        } else if (DIST_TIER_MAP[type]) {
            cost = getDistCost(type, dGsm, dSize, val);
        }

        if (cost > 0) {
            cost = Math.round(cost * 100) / 100;
            dTotal += cost;
            dH += '<div class="summary-line"><span>' + label + ' x' + val.toLocaleString() + '</span><b>$' + cost.toFixed(2) + '</b></div>';
            hasD = true;
        }
    });

    // Multiple Flyer per Unit (HDB, Landed, Industrial) - uses Distribution Only logic
    [
        {section:'hdb', countId:'hdbMultiCount', label:'HDB Multi-Flyer', tiers:HDB_STD, rates:HDB_STD_RATE},
        {section:'landed', countId:'landedMultiCount', label:'Landed Multi-Flyer', tiers:LANDED, rates:LANDED_RATE},
        {section:'ind', countId:'indMultiCount', label:'Industrial Multi-Flyer', tiers:LANDED, rates:LANDED_RATE}
    ].forEach(function(cfg) {
        var count = parseInt(document.getElementById(cfg.countId).value) || 0;
        if (count <= 0) return;
        var designs = [];
        for (var d = 0; d < count; d++) {
            var ds = document.getElementById(cfg.section + 'MultiSize' + d);
            var dg = document.getElementById(cfg.section + 'MultiGsm' + d);
            var dq = document.getElementById(cfg.section + 'MultiQty' + d);
            if (ds && dg && dq) {
                designs.push({size:ds.value, gsm:dg.value, qty:parseFloat(dq.value) || 0});
            }
        }
        // Use highest GSM across designs
        var gsmOrder = {'128':1,'157':2,'260':3};
        var highestGsm = '128';
        designs.forEach(function(d) {
            if ((gsmOrder[d.gsm]||0) > (gsmOrder[highestGsm]||0)) highestGsm = d.gsm;
        });
        var rates = cfg.rates[highestGsm];
        var tiers = cfg.tiers[highestGsm];
        if (!rates) return;
        // Split designs: <3K uses tier pricing, >=3K uses per-1K rate
        var tierGroup = [], rateGroup = [];
        designs.forEach(function(d) {
            if (d.qty > 0) {
                if (d.qty >= 3000 || !tiers) rateGroup.push(d);
                else tierGroup.push(d);
            }
        });
        var multiCost = 0;
        // Tier group: combine quantities, single tier lookup, tagalong, MOQ
        if (tierGroup.length > 0) {
            var combinedQty = 0, maxSizeIdx = 0;
            tierGroup.forEach(function(d) {
                combinedQty += d.qty;
                var si = {A5:1, A4:2, A3:3}[d.size] || 1;
                if (si > maxSizeIdx) maxSizeIdx = si;
            });
            var p = prorate(tiers, combinedQty, maxSizeIdx);
            if (p !== null) {
                var tierCost = p;
                if (tierGroup.length > 1) tierCost -= 10;
                var moq = tiers[0][maxSizeIdx];
                if (tierCost < moq) tierCost = moq;
                multiCost += tierCost;
            }
        }
        // Rate group: per-1K with tagalong discount
        rateGroup.forEach(function(d, rIdx) {
            var fullRate = rates[d.size] || 0;
            var isTagalong = rIdx > 0 && rateGroup[0].qty >= 5000;
            var rate = isTagalong ? fullRate - 10 : fullRate;
            multiCost += (d.qty / 1000) * rate;
        });
        if (multiCost > 0) {
            multiCost = Math.round(multiCost * 100) / 100;
            dTotal += multiCost;
            var designSummary = designs.filter(function(d){return d.qty>0;}).map(function(d){return d.size+'/'+d.gsm+' x'+d.qty.toLocaleString();}).join(', ');
            dH += '<div class="summary-line"><span>' + cfg.label + ' (' + designSummary + ')</span><b>$' + multiCost.toFixed(2) + '</b></div>';
            hasD = true;
        }
    });

    // Delivery
    if (document.getElementById('delToggle').checked) {
        dTotal += DELIVERY_FEE;
        dH += '<div class="summary-line"><span>Delivery Service</span><b>$' + DELIVERY_FEE.toFixed(2) + '</b></div>';
        hasD = true;
    }

    document.getElementById('pBreak').innerHTML = hasP ? pH : '';
    document.getElementById('dBreak').innerHTML = hasD ? dH : '';
    var grand = Math.round((pTotal + dTotal) * 100) / 100;
    document.getElementById('sumGrand').textContent = '$' + grand.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function updateMultiDesigns(section) {
    var count = parseInt(document.getElementById(section + 'MultiCount').value) || 0;
    if (count > 10) count = 10;
    var container = document.getElementById(section + 'MultiRows');
    var html = '';
    for (var d = 0; d < count; d++) {
        html += '<div style="display:flex; gap:8px; align-items:center; padding:4px 0; border-bottom:1px solid #f1f5f9;">';
        html += '<span style="font-size:11px; font-weight:600; color:var(--navy); min-width:60px;">#' + (d+1) + '</span>';
        html += '<select id="' + section + 'MultiSize' + d + '" onchange="update()" style="width:auto;">';
        html += '<option value="A5">A5</option><option value="A4" selected>A4</option><option value="A3">A3</option>';
        html += '</select>';
        html += '<select id="' + section + 'MultiGsm' + d + '" onchange="update()" style="width:auto;">';
        html += '<option value="128">128gsm</option><option value="157">157gsm</option><option value="260">260gsm</option>';
        html += '</select>';
        html += '<input type="number" id="' + section + 'MultiQty' + d + '" placeholder="Qty" oninput="update()" style="width:100px;">';
        html += '</div>';
    }
    container.innerHTML = html;
    update();
}

function resetAll() {
    document.querySelectorAll('input[type="number"]').forEach(function(i) { i.value = ''; });
    document.querySelectorAll('select').forEach(function(s) { s.selectedIndex = 0; });
    document.getElementById('delToggle').checked = false;
    document.getElementById('hdbMultiRows').innerHTML = '';
    document.getElementById('landedMultiRows').innerHTML = '';
    document.getElementById('indMultiRows').innerHTML = '';
    update();
}

update();
