<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Calculator — Alibaba</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
    --primary: #1e40af;
    --primary-dark: #1e3a8a;
    --primary-light: #dbeafe;
    --accent: #10b981;
    --warn: #f59e0b;
    --text: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --bg: #f1f5f9;
    --bg-card: #ffffff;
    --bg-soft: #f8fafc;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
}

.shell {
    max-width: 1400px;
    margin: 0 auto;
    padding: 24px;
}

.page-header {
    margin-bottom: 20px;
}
.page-title {
    font-size: 26px;
    font-weight: 800;
    color: var(--primary-dark);
    letter-spacing: -0.3px;
}
.page-subtitle {
    font-size: 14px;
    color: var(--text-muted);
    margin-top: 4px;
}

.option-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
}

.opt {
    padding: 20px 18px;
    background: var(--bg-card);
    border: 2px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all .15s;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
}
.opt:hover {
    border-color: var(--primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(30,64,175,.12);
}
.opt.active {
    background: var(--primary-dark);
    border-color: var(--primary-dark);
    color: white;
    box-shadow: 0 6px 18px rgba(30,58,138,.25);
}
.opt-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--primary-light);
    color: var(--primary);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 4px;
}
.opt.active .opt-icon { background: rgba(255,255,255,.15); color: white; }
.opt-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
}
.opt.active .opt-title { color: white; }
.opt-desc {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
}
.opt.active .opt-desc { color: rgba(255,255,255,.7); }

/* Calculator frame */
.frame-wrap {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15,23,42,.04);
    display: none;
}
.frame-wrap.active { display: block; }
.frame-header {
    padding: 14px 20px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.frame-header-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
}
.frame-link {
    font-size: 12px;
    color: var(--primary);
    font-weight: 600;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 6px;
    transition: background .15s;
}
.frame-link:hover { background: var(--primary-light); }

.frame {
    width: 100%;
    height: 1800px;
    border: none;
    display: block;
}

.empty-state {
    background: var(--bg-card);
    border: 2px dashed var(--border);
    border-radius: 14px;
    padding: 60px 24px;
    text-align: center;
    color: var(--text-muted);
}
.empty-state-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state-text { font-size: 14px; font-weight: 600; }
.empty-state-hint { font-size: 12px; margin-top: 4px; color: var(--text-muted); }

@media (max-width: 1000px) {
    .option-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
    .option-grid { grid-template-columns: 1fr; }
    .shell { padding: 16px; }
    .frame { height: 2000px; }
}
</style>
</head>
<body>

<div class="shell">
    <div class="page-header">
        <div class="page-title">Quotation Calculator</div>
        <div class="page-subtitle">Select a package type below to open the calculator</div>
    </div>

    <div class="option-grid">
        <button class="opt" data-target="pd" onclick="pick('pd')">
            <span class="opt-icon">📦</span>
            <span class="opt-title">Printing &amp; Distribution</span>
            <span class="opt-desc">Reference pricing tables for all package combos</span>
        </button>
        <button class="opt" data-target="po" onclick="pick('po')">
            <span class="opt-icon">🖨️</span>
            <span class="opt-title">Printing Only</span>
            <span class="opt-desc">Click-to-select tier pricing with finishing</span>
        </button>
        <button class="opt" data-target="do" onclick="pick('do')">
            <span class="opt-icon">🚚</span>
            <span class="opt-title">Distribution Only</span>
            <span class="opt-desc">HDB, Letterbox, Landed, Walkway &amp; more</span>
        </button>
        <button class="opt" data-target="h" onclick="pick('h')">
            <span class="opt-icon">⚡</span>
            <span class="opt-title">Hybrid Package</span>
            <span class="opt-desc">Printing + all distribution services</span>
        </button>
    </div>

    <div id="emptyState" class="empty-state">
        <div class="empty-state-icon">👆</div>
        <div class="empty-state-text">Choose a calculator above to get started</div>
        <div class="empty-state-hint">Your selection will load here</div>
    </div>

    <div class="frame-wrap" id="frame-pd">
        <div class="frame-header">
            <span class="frame-header-title">Printing &amp; Distribution Packages</span>
            <a class="frame-link" href="printing-distribution2.html" target="_blank">Open in new tab ↗</a>
        </div>
        <iframe class="frame" id="iframe-pd" data-src="printing-distribution2.html" title="Printing & Distribution"></iframe>
    </div>

    <div class="frame-wrap" id="frame-po">
        <div class="frame-header">
            <span class="frame-header-title">Printing Only</span>
            <a class="frame-link" href="printingonly2.html" target="_blank">Open in new tab ↗</a>
        </div>
        <iframe class="frame" id="iframe-po" data-src="printingonly2.html" title="Printing Only"></iframe>
    </div>

    <div class="frame-wrap" id="frame-do">
        <div class="frame-header">
            <span class="frame-header-title">Distribution Only</span>
            <a class="frame-link" href="distribution2.html" target="_blank">Open in new tab ↗</a>
        </div>
        <iframe class="frame" id="iframe-do" data-src="distribution2.html" title="Distribution Only"></iframe>
    </div>

    <div class="frame-wrap" id="frame-h">
        <div class="frame-header">
            <span class="frame-header-title">Hybrid Package</span>
            <a class="frame-link" href="hybrid2.html" target="_blank">Open in new tab ↗</a>
        </div>
        <iframe class="frame" id="iframe-h" data-src="hybrid2.html" title="Hybrid Package"></iframe>
    </div>
</div>

<script>
var loaded = {};

function pick(id) {
    // Update buttons
    document.querySelectorAll('.opt').forEach(function(b) {
        b.classList.toggle('active', b.dataset.target === id);
    });
    // Hide all frames
    document.querySelectorAll('.frame-wrap').forEach(function(w) {
        w.classList.remove('active');
    });
    // Hide empty state
    document.getElementById('emptyState').style.display = 'none';
    // Show the selected frame
    var wrap = document.getElementById('frame-' + id);
    if (wrap) {
        wrap.classList.add('active');
        // Lazy-load iframe on first pick
        if (!loaded[id]) {
            var iframe = document.getElementById('iframe-' + id);
            iframe.src = iframe.dataset.src;
            loaded[id] = true;
        }
        // Scroll to frame smoothly
        setTimeout(function() {
            wrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 50);
    }
}

// Allow deep-linking via ?calc=h, ?calc=pd etc.
(function(){
    var params = new URLSearchParams(window.location.search);
    var c = params.get('calc');
    if (c && ['pd','po','do','h'].indexOf(c) !== -1) {
        pick(c);
    }
})();
</script>

</body>
</html>
